name: Update eBay graded averages

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Single athlete name (e.g. Ronald Acuna Jr.) — leave empty for full batch"
        required: false
        default: ""

concurrency:
  group: ebay-graded-avg-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        if: hashFiles('package-lock.json') != ''
        run: npm install --no-audit --no-fund

      - name: Update eBay graded averages
        run: node scripts/graded-update-ebay-avg.js
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_ONLY: ${{ github.event.inputs.only }}

      - name: Copy to public
        run: |
          mkdir -p public/data
          cp data/ebay-graded-avg.json public/data/ebay-graded-avg.json

      - name: Commit & push (rebase-safe)
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ebay-graded-avg.json data/ebay-graded-base-prices.json public/data/ebay-graded-avg.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update eBay graded averages"

          git fetch origin main
          git rebase --autostash origin/main || (git rebase --abort && git pull --rebase origin main)

          git push origin HEAD:main
