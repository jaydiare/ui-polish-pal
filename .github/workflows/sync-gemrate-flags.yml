name: Sync Gemrate Flags

on:
  schedule:
    - cron: "0 14 * * 0" # Every Sunday at 14:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync gemrate flags
        run: node scripts/sync-gemrate-flags.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/athletes.json public/data/athletes.json
          git diff --cached --quiet || git commit -m "🔄 Sync gemrate flags from grading data"
          git fetch origin main
          git rebase --autostash origin/main || (git rebase --abort && git pull --rebase origin main)
          git push origin HEAD:main
