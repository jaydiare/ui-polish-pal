name: Gemrate Sales Trends (Monthly)

on:
  schedule:
    # 1st of every month at 10:00 UTC
    - cron: "0 10 1 * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Fetch gemrate sales trends
        run: node scripts/fetch-gemrate-sales-trends.js

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gemrate-sales-trends.json public/data/gemrate-sales-trends.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update gemrate sales trends [skip ci]"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break || sleep 5
          done
