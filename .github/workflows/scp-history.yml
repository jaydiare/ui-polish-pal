name: Fetch SportsCardsPro History

on:
  workflow_dispatch: # Manual trigger only (one-time run)

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Puppeteer
        run: npm install puppeteer@latest

      - name: Run SCP history fetch
        env:
          SPORTSCARDSPRO: ${{ secrets.SPORTSCARDSPRO }}
        run: node scripts/fetch-scp-history.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scp-history.json public/data/scp-history.json
          git diff --cached --quiet || git commit -m "📊 SportsCardsPro historical data $(date -u +%Y-%m-%d)"
          git push
