name: Daily Athlete History Snapshot

on:
  schedule:
    # Run daily at 10:00 UTC (after both raw + graded listing updates complete)
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run snapshot script
        run: node scripts/snapshot-athlete-history.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/athlete-history.json data/athlete-first-seen.json
          git diff --cached --quiet || git commit -m "📸 Daily athlete history snapshot $(date -u +%Y-%m-%d)"
          git push
