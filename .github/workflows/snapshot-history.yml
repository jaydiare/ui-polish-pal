name: Daily Athlete History Snapshot

on:
  schedule:
    # Run daily at 10:00 UTC (after both raw + graded listing updates complete)
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run snapshot script
        run: node scripts/snapshot-athlete-history.js

      - name: Commit & push (rebase-safe)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/athlete-history.json data/athlete-first-seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📸 Daily athlete history snapshot $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase --autostash origin/main || (git rebase --abort && git pull --rebase --autostash origin main)
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1

