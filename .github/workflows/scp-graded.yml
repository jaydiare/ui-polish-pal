name: Bi-weekly SportsCardsPro Graded Prices

on:
  schedule:
    - cron: "0 11 1,15 * *" # 1st and 15th of every month at 11:00 UTC
  workflow_dispatch:
    inputs:
      only:
        description: "Single athlete name (e.g. Ronald Acuna Jr.) — leave empty for full batch"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch SCP Graded prices (PSA 9 + PSA 10)
        env:
          SPORTSCARDSPRO: ${{ secrets.SPORTSCARDSPRO }}
          SCP_ONLY: ${{ github.event.inputs.only }}
        run: node scripts/fetch-scp-graded.js

      - name: Commit & push (rebase-safe)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scp-graded.json public/data/scp-graded.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🏆 Bi-weekly SCP graded prices $(date -u +%Y-%m-%d)"
          git fetch origin main
          git rebase --autostash origin/main || (git rebase --abort && git pull --rebase origin main)
          git push origin HEAD:main
