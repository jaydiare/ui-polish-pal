name: Monthly SportsCardsPro Prices

on:
  schedule:
    - cron: "0 10 1 * *" # 1st of every month at 10:00 UTC
  workflow_dispatch:
    inputs:
      only:
        description: "Single athlete name (e.g. Ronald Acuna Jr.) — leave empty for full batch"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch SCP Raw prices
        env:
          SPORTSCARDSPRO: ${{ secrets.SPORTSCARDSPRO }}
          SCP_ONLY: ${{ github.event.inputs.only }}
        run: node scripts/fetch-scp-raw.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scp-raw.json public/data/scp-raw.json
          git diff --cached --quiet || git commit -m "🏷️ Monthly SCP raw prices $(date -u +%Y-%m-%d)"
          git push
