name: Fetch eBay Most Watched Athletes

on:
  schedule:
    - cron: "0 14 * * 1"   # Every Monday at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-most-watched:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch most watched items
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
        run: node scripts/fetch-most-watched.js

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ebay-most-watched.json public/data/ebay-most-watched.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update most watched athletes [skip ci]"
          git fetch origin main
          git rebase --autostash origin/main || (git rebase --abort && git pull --rebase origin main)
          git push origin main
